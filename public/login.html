<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp Bot — Giriş</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center}
    .login-card{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:48px 40px;width:100%;max-width:400px;box-shadow:0 25px 50px rgba(0,0,0,0.3)}
    .logo{text-align:center;margin-bottom:32px}
    .logo .icon{width:56px;height:56px;border-radius:14px;background:linear-gradient(135deg,#25D366,#128C7E);display:inline-flex;align-items:center;justify-content:center;font-size:1.8rem;margin-bottom:12px}
    .logo h1{font-size:1.3rem;font-weight:700}
    .logo p{font-size:.85rem;color:#94a3b8;margin-top:4px}
    .form-group{margin-bottom:20px}
    .form-group label{display:block;font-size:.82rem;font-weight:600;color:#94a3b8;margin-bottom:8px}
    .form-group input{width:100%;padding:12px 16px;background:#0f172a;border:1px solid #334155;border-radius:10px;color:#e2e8f0;font-size:.95rem;font-family:'Inter',sans-serif;outline:none;transition:border-color .3s}
    .form-group input:focus{border-color:#25D366}
    .btn{width:100%;padding:14px;border:none;border-radius:10px;background:linear-gradient(135deg,#25D366,#128C7E);color:#fff;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .3s;font-family:'Inter',sans-serif}
    .btn:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(37,211,102,0.3)}
    .error{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#fca5a5;padding:10px 14px;border-radius:8px;font-size:.85rem;margin-bottom:16px;display:none}
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">
      <div class="icon">💬</div>
      <h1>WhatsApp Bot</h1>
      <p>Admin Panel Girişi</p>
    </div>
    <div class="error" id="error"></div>
    <form id="loginForm">
      <div class="form-group">
        <label>E-posta</label>
        <input type="email" id="email" placeholder="admin@example.com" required>
      </div>
      <div class="form-group">
        <label>Şifre</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn">Giriş Yap</button>
    </form>
  </div>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async(e) => {
      e.preventDefault();
      const errEl = document.getElementById('error');
      errEl.style.display = 'none';
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();
        if (data.success) {
          localStorage.setItem('token', data.token);
          window.location.href = '/admin';
        } else {
          errEl.textContent = data.error || 'Giriş başarısız';
          errEl.style.display = 'block';
        }
      } catch(err) {
        errEl.textContent = 'Bağlantı hatası';
        errEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
